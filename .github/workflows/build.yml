name: Build portfinder
on:
  push:
    branches:
      - ite_dev
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v -o build-output/ ./...
      - name: Run tests
        run: go test ./... || echo "No test files found"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfinder-binary-${{ github.run_number }}
          path: build-output/
          retention-days: 7
